<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="generator" content="DocToPDF">
<title>{{ title }}</title>
<style>
  :root { color-scheme: light dark; --fg: #1a1a1a; --muted: #6b7280; --bg: #ffffff;
          --accent: #2563eb; --border: #e5e7eb; --code: #f4f4f5; }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e7e7ea; --muted: #9aa0aa; --bg: #16171a; --accent: #6ea8ff;
            --border: #2a2c31; --code: #212327; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 17px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         -webkit-font-smoothing: antialiased; }
  main { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
  header { margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  h1 { font-size: 2.1rem; line-height: 1.2; margin: 0; letter-spacing: -0.02em; }
  h2 { font-size: 1.5rem; margin: 2em 0 .6em; letter-spacing: -0.01em; }
  h3 { font-size: 1.2rem; margin: 1.8em 0 .5em; }
  p, ul, ol, table, pre, blockquote { margin: 0 0 1.1em; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ul, ol { padding-left: 1.4em; }
  li { margin: .25em 0; }
  blockquote { margin-left: 0; padding: .2em 1.1em; border-left: 3px solid var(--accent);
               color: var(--muted); }
  code { background: var(--code); padding: .15em .4em; border-radius: 4px;
         font: .88em/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  pre { background: var(--code); padding: 14px 16px; border-radius: 8px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  table { border-collapse: collapse; width: 100%; font-size: .95em; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  th { background: var(--code); }
  footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
           color: var(--muted); font-size: .85rem; }
  img { max-width: 100%; height: auto; }
</style>
</head>
<body>
<main>
  <header><h1>{{ title }}</h1></header>
  <article>{{ content }}</article>
  <footer>Published with DocToPDF.</footer>
</main>
</body>
</html>
